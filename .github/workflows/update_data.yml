name: Daily NSE Data Fetcher

# This runs every weekday at 4:30 PM IST (11:00 AM UTC), and allows manual clicking
on:
  schedule:
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Python Engine
        run: python generate_data.py

      - name: Commit and Push JSON
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add market_data.json
          # Only commit if the data actually changed
          git commit -m "Automated daily market data update" || echo "No changes to commit"
          git push
