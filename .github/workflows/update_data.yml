name: Daily NSE Data Fetcher

# TESTING: Set to run at 12:52 UTC (6:22 PM IST)
on:
  schedule:
    - cron: '52 12 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Market Data Engine
        run: python generate_data.py

      - name: Run Breadth Data Engine
        run: python generate_breadth.py

      - name: Commit and Push JSON
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Automated daily market and breadth data update" || echo "No changes to commit"
          git push
