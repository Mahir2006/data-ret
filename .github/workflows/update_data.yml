name: Daily NSE Data Fetcher

# Testing: Set to run at 12:52 UTC (6:22 PM IST)
on:
  schedule:
    - cron: '52 12 * * *'
  workflow_dispatch:

# CRITICAL FIX 1: Explicitly grant write permissions so the bot can push to the repo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      # - name: Run Market Data Engine
      #   run: python generate_data.py

      # - name: Run Breadth Data Engine
      #   run: python generate_breadth.py

      - name: Run Earnings Data Engine
        run: python generate_earnings.py
        
      # - name: Run Seasonality Data Engine
      #   run: python generate_seasonality.py

      - name: Commit and Push JSON
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # CRITICAL FIX 2: Added seasonality_data.json to the tracking list
          git add market_data.json breadth_data.json earnings_data.json seasonality_data.json
          
          # Only commit and push if there are actual changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated daily market, breadth, earnings, and seasonality update" && git push)
